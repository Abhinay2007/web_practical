<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Example with Two IDs</title>
    <script>
        function showContent(){
            document.getElementById("heading").innerHTML="Welcome Student!";
            document.getElementById("message").innerHTML="This content is displayrd usingJavascript DOM";

        }
    </script>



</head>
<body bgcolor="#FFFF00">
    <center>
        <h2 id="heading"> Javascript DOM Example</h2>
        <hr width="40%">

        <button onclick="showContent()" style="background-color: aqua;">Click Here</button>
        <br><br>

        <p id="message">Click button to see message</p>
        <hr width="40%">        
    </center>
    <center>        
        <small>Web Development Practical Number 7</small>
    </center>
    
</body>
</html>
