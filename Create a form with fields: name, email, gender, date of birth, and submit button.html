<!DOCTYPE html>
<html>
<head>
<title>Student Registration Form</title>
</head>
    <body bgcolor="FCF251">
    <center>
        <h1>Student Registration Form</h1>
    </center>
        <hr width="60%">
        <br>
        <form>
    <center>
        <b>Name :</b><br>
        <input type="text" name="name" size="30" placeholder="Enter your full name">
        <br><br>
        <b>Email :</b><br>
        <input type="email" name="email" size="30" placeholder="Enter your email address">
        <br><br>
        <b>Gender :</b><br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        <br><br>
        <b>Date of Birth :</b><br>
        <input type="date" name="dob">
        <br><br><br>
        <input type="submit" value="Submit Form">
        &nbsp;&nbsp;
        <input type="reset" value="Clear Form">
    </center>
        </form>
        <br>
        <hr width="60%">
    <center>
        <small>Web Development Practical 3</small>
    </center>
</body>
</html>
